<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">Industrial Supplier | IndustroHub</title>

<meta name="description" id="metaDesc">

<link rel="stylesheet" href="css/style.css">

</head>


<body>

<header style="background:#0f172a;color:white;padding:20px;">

<h2>IndustroHub</h2>

</header>



<section style="padding:40px;max-width:900px;margin:auto;">

<h1 id="heading"></h1>

<p id="text1"></p>

<p id="text2"></p>

<div style="margin-top:20px;">

<a href="rfq.html" style="
background:#2563eb;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:6px;
">
Post Requirement
</a>

</div>

</section>



<section style="background:#f1f5f9;padding:40px;">

<div style="max-width:900px;margin:auto;">

<h2>Why Use IndustroHub?</h2>

<ul>

<li>Connect with verified industrial suppliers</li>

<li>Receive multiple supplier quotations</li>

<li>Compare prices easily</li>

<li>Save time sourcing industrial materials</li>

</ul>

</div>

</section>



<section style="padding:40px;">

<div style="max-width:900px;margin:auto;">

<h2>Latest Industrial Requirements</h2>

<div id="liveRFQs"></div>

</div>

</section>



<section style="background:#f8fafc;padding:40px;">

<div style="max-width:900px;margin:auto;">

<h2>Related Searches</h2>

<ul id="relatedLinks"></ul>

</div>

</section>



<footer style="background:#0f172a;color:white;padding:20px;text-align:center;">

<p>© 2026 IndustroHub</p>

</footer>



<script src="js/live-rfq.js"></script>



<script>

const params = new URLSearchParams(window.location.search)

const item = params.get("item")
const city = params.get("city")

if(item && city){

const product = item.replaceAll("-", " ")
const cityName = city.replaceAll("-", " ")

const productTitle = product.replace(/\b\w/g, l => l.toUpperCase())
const cityTitle = cityName.replace(/\b\w/g, l => l.toUpperCase())

document.getElementById("pageTitle").innerText =
productTitle + " Supplier in " + cityTitle + " | IndustroHub"

document.getElementById("metaDesc").setAttribute(
"content",
"Looking for " + productTitle + " suppliers in " + cityTitle + "? Post your requirement on IndustroHub and receive supplier quotations quickly."
)

document.getElementById("heading").innerText =
productTitle + " Supplier in " + cityTitle

document.getElementById("text1").innerText =
productTitle + " is widely used in fabrication, construction, and manufacturing industries across " + cityTitle + "."

document.getElementById("text2").innerText =
"Industries in " + cityTitle + " often require reliable " + productTitle + " suppliers for engineering and industrial projects. Post your requirement on IndustroHub and receive supplier quotations quickly."


const related = document.getElementById("relatedLinks")

const relatedProducts = [
"ms-rod",
"ms-pipe",
"steel-plate",
"fabrication-service",
"machine-shop"
]

relatedProducts.forEach(p => {

if(p !== item){

const li = document.createElement("li")

const name = p.replaceAll("-", " ").replace(/\b\w/g, l => l.toUpperCase())

li.innerHTML = `<a href="product.html?item=${p}&city=${city}">${name} Supplier ${cityTitle}</a>`

related.appendChild(li)

}

})

}

</script>



</body>

</html>
