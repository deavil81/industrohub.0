<!DOCTYPE html>
<html>
<head>
<title>Post RFQ</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Post Your Requirement</h1>

<form id="rfqForm">

<input type="text" name="product" placeholder="Product Name" required>

<select name="category">
<option>Steel</option>
<option>Fabrication</option>
<option>Machining</option>
<option>Industrial Tools</option>
</select>

<input type="text" name="specification" placeholder="Specification">

<input type="text" name="quantity" placeholder="Quantity">

<input type="text" name="location" placeholder="Location">

<input type="text" name="delivery" placeholder="Delivery Time">

<textarea name="description" placeholder="Description"></textarea>

<input type="text" name="phone" placeholder="Phone Number">

<button type="submit">Submit RFQ</button>

</form>

</div>

</body>

</html>
