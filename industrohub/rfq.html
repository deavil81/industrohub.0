<!DOCTYPE html>
<html>
<head>
<title>Post RFQ</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Post Your Requirement</h1>

<form>

<label>Product Name</label>
<input type="text" required>

<label>Category</label>
<select>
<option>Steel</option>
<option>Fabrication</option>
<option>Machining</option>
<option>Industrial Tools</option>
</select>

<label>Specification</label>
<input type="text">

<label>Quantity</label>
<input type="text">

<label>Location</label>
<input type="text">

<label>Delivery Time</label>
<input type="text">

<label>Description</label>
<textarea></textarea>

<label>Phone Number</label>
<input type="text">

<br><br>

<button class="btn-primary">Submit RFQ</button>

</form>

</div>

</body>
</html>
